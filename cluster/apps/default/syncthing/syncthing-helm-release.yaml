# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: syncthing
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://bjw-s-labs.github.io/helm-charts
      chart: app-template
      version: 4.6.2
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: syncthing/syncthing
              tag: 2.0.16
              pullPolicy: IfNotPresent

    service:
      main:
        controller: main
        ports:
          http:
            port: 8384
          sync-tcp:
            port: 22000
            protocol: TCP
            targetPort: 22000
          discovery:
            port: 21027
            protocol: UDP
            targetPort: 21027

    ingress:
      main:
        enabled: true
        className: "internal"
        annotations:
          external-dns/is-public: "false"
        hosts:
          - host: "syncthing.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - "syncthing.${SECRET_DOMAIN}"

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: syncthing-pvc
        globalMounts:
          - path: /var/syncthing
