apiVersion: apps/v1
kind: Deployment
metadata:
  name: openchamber
  namespace: default
  labels:
    app.kubernetes.io/name: openchamber
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openchamber
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openchamber
        app.kubernetes.io/component: ui
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: openchamber
          image: node:22-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              export NPM_CONFIG_PREFIX=/home/openchamber/.npm-global
              export npm_config_cache=/home/openchamber/.npm
              export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
              mkdir -p "$NPM_CONFIG_PREFIX" "$npm_config_cache" "$OPENCHAMBER_DATA_DIR"

              if [ ! -x "$NPM_CONFIG_PREFIX/bin/openchamber" ] || [ "$(cat /home/openchamber/.openchamber-version 2>/dev/null || true)" != "$OPENCHAMBER_VERSION" ]; then
                npm install --global "@openchamber/web@$OPENCHAMBER_VERSION"
                echo "$OPENCHAMBER_VERSION" > /home/openchamber/.openchamber-version
              fi

              if [ ! -x "$NPM_CONFIG_PREFIX/bin/opencode" ] || [ "$(cat /home/openchamber/.opencode-version 2>/dev/null || true)" != "$OPENCODE_VERSION" ]; then
                npm install --global "opencode-ai@$OPENCODE_VERSION"
                echo "$OPENCODE_VERSION" > /home/openchamber/.opencode-version
              fi

              export OPENCODE_BINARY="$NPM_CONFIG_PREFIX/bin/opencode"

              exec "$NPM_CONFIG_PREFIX/bin/openchamber"
          env:
            - name: HOME
              value: /home/openchamber
            - name: OPENCHAMBER_VERSION
              value: "1.14.0"
            - name: OPENCODE_VERSION
              value: "1.17.13"
            - name: OPENCHAMBER_HOST
              value: 0.0.0.0
            - name: OPENCHAMBER_PORT
              value: "3000"
            - name: OPENCHAMBER_DATA_DIR
              value: /home/openchamber/.config/openchamber
            - name: OPENCODE_HOST
              value: http://opencode:4096
            - name: OPENCODE_SKIP_START
              value: "true"
            - name: OPENCHAMBER_OPENCODE_HOSTNAME
              value: opencode
          envFrom:
            - secretRef:
                name: opencode-openchamber-secrets
          ports:
            - name: http
              containerPort: 3000
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: openchamber-config
              mountPath: /home/openchamber
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: openchamber-config
          persistentVolumeClaim:
            claimName: openchamber-config
        - name: tmp
          emptyDir: {}
