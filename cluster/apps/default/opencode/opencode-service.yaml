apiVersion: v1
kind: Service
metadata:
  name: opencode
  namespace: default
  labels:
    app.kubernetes.io/name: opencode
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opencode
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 4096
      targetPort: http
    - name: preview
      port: 4173
      targetPort: preview
    - name: plannotator
      port: 19432
      targetPort: plannotator
