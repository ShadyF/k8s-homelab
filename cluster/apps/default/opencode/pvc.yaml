apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opencode-config
  namespace: default
  labels:
    app.kubernetes.io/name: opencode
    app.kubernetes.io/component: config
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opencode-data
  namespace: default
  labels:
    app.kubernetes.io/name: opencode
    app.kubernetes.io/component: data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 30Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openchamber-config
  namespace: default
  labels:
    app.kubernetes.io/name: openchamber
    app.kubernetes.io/component: config
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
