---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plex-promtail-configmap
  namespace: default
data:
  promtail.yaml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push
    scrape_configs:
      - job_name: plex
        static_configs:
          - targets:
              - localhost
            labels:
              app: plex
              job: plex
              __path__: /config/Library/Application Support/Plex Media Server/Logs/*.log
