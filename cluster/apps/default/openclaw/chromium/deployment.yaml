apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromium
  namespace: default
  labels:
    app: chromium
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chromium
  template:
    metadata:
      labels:
        app: chromium
    spec:
      containers:
        - name: chromium
          image: zenika/alpine-chrome:124
          args:
            - --headless
            - --disable-gpu
            - --no-sandbox
            - --disable-software-rasterizer
            - --remote-debugging-address=127.0.0.1
            - --remote-debugging-port=9222
            - --remote-allow-origins=*
            - --user-data-dir=/data/chromium
          env:
            - name: TZ
              value: Africa/Cairo
            - name: XDG_CACHE_HOME
              value: /data/cache
            - name: DBUS_SESSION_BUS_ADDRESS
              value: /dev/null
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: debug
              containerPort: 9222
              protocol: TCP
          volumeMounts:
            - name: chromium-data
              mountPath: /data
            - name: chromium-shm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 9222
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9222
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: proxy
          image: nginx:1.29.8-alpine
          ports:
            - name: proxy
              containerPort: 9223
              protocol: TCP
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 20m
              memory: 48Mi
            limits:
              cpu: 100m
              memory: 96Mi
      volumes:
        - name: chromium-data
          persistentVolumeClaim:
            claimName: chromium-data
        - name: chromium-shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: proxy-config
          configMap:
            name: chromium-proxy-config
