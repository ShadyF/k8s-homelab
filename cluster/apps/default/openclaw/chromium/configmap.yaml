apiVersion: v1
kind: ConfigMap
metadata:
  name: chromium-proxy-config
  namespace: default
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      server {
        listen 9223;
        location / {
          proxy_pass http://127.0.0.1:9222;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "Upgrade";
          # Chromium DevTools rejects non-localhost Host headers.
          # Keep localhost upstream, then rewrite advertised loopback websocket URLs
          # so OpenClaw can reconnect through the cluster-internal chromium Service.
          proxy_set_header Host localhost;
          proxy_set_header Accept-Encoding "";
          proxy_read_timeout 86400;
          sub_filter_once off;
          sub_filter_types application/json;
          sub_filter 'ws://localhost/' 'ws://chromium:9222/';
          sub_filter 'ws://localhost:9222/' 'ws://chromium:9222/';
          sub_filter 'ws://127.0.0.1:9222/' 'ws://chromium:9222/';
        }
      }
    }
