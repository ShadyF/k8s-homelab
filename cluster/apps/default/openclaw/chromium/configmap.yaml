apiVersion: v1
kind: ConfigMap
metadata:
  name: chromium-proxy-config
  namespace: default
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      server {
        listen 9223;
        location / {
          proxy_pass http://127.0.0.1:9222;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "Upgrade";
          # Chromium DevTools requires a localhost Host header here.
          # Rewrite the advertised loopback websocket URL so OpenClaw can reconnect via the chromium Service.
          proxy_set_header Host localhost;
          proxy_read_timeout 86400;
          sub_filter_types application/json;
          sub_filter 'ws://localhost/' 'ws://chromium:9222/';
        }
      }
    }
