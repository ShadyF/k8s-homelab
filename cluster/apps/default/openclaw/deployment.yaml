apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: default
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
      annotations:
        checksum/openclaw-config: 471dbba8e9389abd826927c40849b28b04ed6ab266dbe104652df623cceb76f2
        checksum/openclaw-secret: 9a4cd68c5c6dbe4b6c4eb5dbaa22d6d30d9da9fec817c2af6bba64011373b2e8
        checksum/openclaw-concierge-workspace: b1764d54c23c76bbdef04b48f6620efe971015b70ed8aba2af8232d539eee8c8
        checksum/openclaw-researcher-workspace: 5a37a771de3ed5b7a9a5564a68500ee581f0c77f13fcbff6a7f69e6b70018ebe
        checksum/openclaw-browser-ops-workspace: dcb4175953c748c3bb995f51a67924bf3bb6331e89ea20e048c7d3e4c7a4cfcd
        checksum/openclaw-coder-workspace: 0c139ae3602f8c9e6001bcdd2c27d36a9092e34f029e9e4bda8158eddd45bc43
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        fsGroupChangePolicy: Always
      initContainers:
        - name: init-config
          image: ghcr.io/openclaw/openclaw:2026.4.15
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -e
              echo "Initializing configuration..."
              mkdir -p /home/node/.openclaw
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json

              refresh_workspace() {
                workspace="$1"
                source_dir="$2"

                mkdir -p "$workspace"
                cp "$source_dir/AGENTS.md" "$workspace/AGENTS.md"
                cp "$source_dir/IDENTITY.md" "$workspace/IDENTITY.md"
                cp "$source_dir/USER.md" "$workspace/USER.md"

                if [ ! -f "$workspace/SOUL.md" ]; then
                  cp "$source_dir/BOOTSTRAP.md" "$workspace/BOOTSTRAP.md"
                else
                  rm -f "$workspace/BOOTSTRAP.md"
                fi
              }

              refresh_workspace "/home/node/.openclaw/concierge-workspace" "/bootstrap/concierge"
              refresh_workspace "/home/node/.openclaw/researcher-workspace" "/bootstrap/researcher"
              refresh_workspace "/home/node/.openclaw/browser-ops-workspace" "/bootstrap/browser-ops"
              refresh_workspace "/home/node/.openclaw/coder-workspace" "/bootstrap/coder"

              echo "Config initialized"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /home/node
            - name: tmp
              mountPath: /tmp
            - name: concierge-workspace-seed
              mountPath: /bootstrap/concierge
            - name: researcher-workspace-seed
              mountPath: /bootstrap/researcher
            - name: browser-ops-workspace-seed
              mountPath: /bootstrap/browser-ops
            - name: coder-workspace-seed
              mountPath: /bootstrap/coder
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:2026.4.15
          imagePullPolicy: IfNotPresent
          command:
            - node
            - openclaw.mjs
            - gateway
          env:
            - name: PATH
              value: "/home/node/homebrew/bin:/home/node/homebrew/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: NODE_ENV
              value: "production"
            - name: OPENCLAW_STATE_DIR
              value: "/home/node/.openclaw"
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: "/home/node/.cache/ms-playwright"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1532"
            - name: OPENCLAW_GATEWAY_PORT
              value: "18789"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: gatewayToken
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: OPENROUTER_API_KEY
            - name: OPENROUTER_TOOLS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: OPENROUTER_TOOLS_API_KEY
            - name: GITHUB_MCP_PAT
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: GITHUB_MCP_PAT
            - name: HEVY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: HEVY_API_KEY
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data
              mountPath: /home/node
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              memory: 2300Mi
              cpu: 2500m
            requests:
              memory: 768Mi
              cpu: 750m
      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: tmp
          emptyDir: {}
        - name: concierge-workspace-seed
          configMap:
            name: openclaw-concierge-workspace
        - name: researcher-workspace-seed
          configMap:
            name: openclaw-researcher-workspace
        - name: browser-ops-workspace-seed
          configMap:
            name: openclaw-browser-ops-workspace
        - name: coder-workspace-seed
          configMap:
            name: openclaw-coder-workspace
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: NotIn
                    values:
                      - arm64
