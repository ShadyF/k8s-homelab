apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: default
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
      annotations:
        checksum/openclaw-config: 1312b24bd932ee0e437cbdbfb1885683c94b494d7a9baa91fdbc5a8df52f7f78
        checksum/openclaw-secret: 9a4cd68c5c6dbe4b6c4eb5dbaa22d6d30d9da9fec817c2af6bba64011373b2e8
        checksum/openclaw-concierge-workspace: b1764d54c23c76bbdef04b48f6620efe971015b70ed8aba2af8232d539eee8c8
        checksum/openclaw-researcher-workspace: 5a37a771de3ed5b7a9a5564a68500ee581f0c77f13fcbff6a7f69e6b70018ebe
        checksum/openclaw-browser-ops-workspace: dcb4175953c748c3bb995f51a67924bf3bb6331e89ea20e048c7d3e4c7a4cfcd
        checksum/openclaw-coder-workspace: 0c139ae3602f8c9e6001bcdd2c27d36a9092e34f029e9e4bda8158eddd45bc43
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        fsGroupChangePolicy: Always
      initContainers:
        - name: init-config
          image: ghcr.io/openclaw/openclaw:2026.4.14
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -eu
              echo "Initializing configuration..."
              mkdir -p /home/node/.openclaw
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json

              export OPENCLAW_STATE_DIR="/home/node/.openclaw"

              export PATH="/home/node/.openclaw/runtime/npm-global/bin:$PATH"
              export NPM_CONFIG_PREFIX="/home/node/.openclaw/runtime/npm-global"
              export LCM_DATABASE_PATH="/home/node/.openclaw/lcm/lcm.db"
              export LCM_LARGE_FILES_DIR="/home/node/.openclaw/lcm/large-files"
              export NODE_LLAMA_CPP_CUDA="false"

              runtime_dir="$OPENCLAW_STATE_DIR/runtime"
              bootstrap_dir="$runtime_dir/bootstrap"
              marker_file="$bootstrap_dir/qmd-lossless-claw.done"

              mkdir -p \
                "$bootstrap_dir" \
                "$(dirname "$NPM_CONFIG_PREFIX")" \
                "$NPM_CONFIG_PREFIX" \
                "$(dirname "$LCM_DATABASE_PATH")" \
                "$LCM_LARGE_FILES_DIR"

              bootstrap_agent_qmd() {
                agent_id="$1"
                workspace_dir="$2"
                agent_qmd_dir="$OPENCLAW_STATE_DIR/agents/$agent_id/qmd"

                mkdir -p \
                  "$workspace_dir" \
                  "$workspace_dir/memory" \
                  "$agent_qmd_dir/sessions" \
                  "$agent_qmd_dir/xdg-config" \
                  "$agent_qmd_dir/xdg-cache"

                if [ ! -f "$workspace_dir/MEMORY.md" ]; then
                  printf '%s\n\n%s\n' "# $agent_id memory seed" "No durable memories exist yet for $agent_id." > "$workspace_dir/MEMORY.md"
                fi

                export XDG_CONFIG_HOME="$agent_qmd_dir/xdg-config"
                export XDG_CACHE_HOME="$agent_qmd_dir/xdg-cache"
                export QMD_CONFIG_DIR="$agent_qmd_dir/xdg-config"

                qmd collection add "$workspace_dir" --name "$agent_id-workspace-root" --glob 'MEMORY.md' || qmd collection add "$workspace_dir" --name "$agent_id-workspace-root" --mask 'MEMORY.md'
                qmd collection add "$workspace_dir/memory" --name "$agent_id-workspace-memory" --glob '**/*.md' || qmd collection add "$workspace_dir/memory" --name "$agent_id-workspace-memory" --mask '**/*.md'
                qmd collection add "$agent_qmd_dir/sessions" --name "$agent_id-sessions" --glob '**/*.jsonl' || qmd collection add "$agent_qmd_dir/sessions" --name "$agent_id-sessions" --mask '**/*.jsonl'

                qmd update
                qmd embed

                collections_list="$(qmd collection list)"
                printf '%s\n' "$collections_list" | grep -q -- "$agent_id-workspace-root"
                printf '%s\n' "$collections_list" | grep -q -- "$agent_id-workspace-memory"
                printf '%s\n' "$collections_list" | grep -q -- "$agent_id-sessions"
                if printf '%s\n' "$collections_list" | grep -Eq 'No collections found|0 files indexed|0 docs'; then
                  echo "QMD bootstrap failed for $agent_id"
                  return 1
                fi
              }

              agent_qmd_ready() {
                agent_id="$1"
                workspace_dir="$2"
                agent_qmd_dir="$OPENCLAW_STATE_DIR/agents/$agent_id/qmd"

                [ -d "$agent_qmd_dir/xdg-config" ] || return 1
                [ -d "$agent_qmd_dir/xdg-cache" ] || return 1
                [ -d "$agent_qmd_dir/sessions" ] || return 1
                [ -d "$workspace_dir" ] || return 1

                collections_list="$(XDG_CONFIG_HOME="$agent_qmd_dir/xdg-config" XDG_CACHE_HOME="$agent_qmd_dir/xdg-cache" QMD_CONFIG_DIR="$agent_qmd_dir/xdg-config" qmd collection list)"
                printf '%s\n' "$collections_list" | grep -q -- "$agent_id-workspace-root" &&
                printf '%s\n' "$collections_list" | grep -q -- "$agent_id-workspace-memory" &&
                printf '%s\n' "$collections_list" | grep -q -- "$agent_id-sessions"
              }

              if [ ! -f "$marker_file" ] || ! agent_qmd_ready concierge "/home/node/.openclaw/concierge-workspace" || ! agent_qmd_ready heba "/home/node/.openclaw/heba-workspace" || ! agent_qmd_ready boys "/home/node/.openclaw/boys-workspace"; then
                npm install -g @tobilu/qmd@2.1.0
                qmd --version
                openclaw plugins install @martian-engineering/lossless-claw@0.9.1 --pin
                bootstrap_agent_qmd concierge "/home/node/.openclaw/concierge-workspace"
                bootstrap_agent_qmd heba "/home/node/.openclaw/heba-workspace"
                bootstrap_agent_qmd boys "/home/node/.openclaw/boys-workspace"
                touch "$marker_file"
              else
                echo "Skipping QMD/lossless-claw bootstrap; marker already exists"
              fi

              refresh_workspace() {
                workspace="$1"
                source_dir="$2"

                mkdir -p "$workspace"
                cp "$source_dir/AGENTS.md" "$workspace/AGENTS.md"
                cp "$source_dir/IDENTITY.md" "$workspace/IDENTITY.md"
                cp "$source_dir/USER.md" "$workspace/USER.md"

                if [ ! -f "$workspace/SOUL.md" ]; then
                  cp "$source_dir/BOOTSTRAP.md" "$workspace/BOOTSTRAP.md"
                else
                  rm -f "$workspace/BOOTSTRAP.md"
                fi
              }

              refresh_workspace "/home/node/.openclaw/concierge-workspace" "/bootstrap/concierge"
              refresh_workspace "/home/node/.openclaw/researcher-workspace" "/bootstrap/researcher"
              refresh_workspace "/home/node/.openclaw/browser-ops-workspace" "/bootstrap/browser-ops"
              refresh_workspace "/home/node/.openclaw/coder-workspace" "/bootstrap/coder"

              echo "Config initialized"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /home/node
            - name: tmp
              mountPath: /tmp
            - name: concierge-workspace-seed
              mountPath: /bootstrap/concierge
            - name: researcher-workspace-seed
              mountPath: /bootstrap/researcher
            - name: browser-ops-workspace-seed
              mountPath: /bootstrap/browser-ops
            - name: coder-workspace-seed
              mountPath: /bootstrap/coder
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:2026.4.14
          imagePullPolicy: IfNotPresent
          command:
            - node
            - openclaw.mjs
            - gateway
          env:
            - name: PATH
              value: "/home/node/.openclaw/runtime/npm-global/bin:/home/node/homebrew/bin:/home/node/homebrew/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: NODE_ENV
              value: "production"
            - name: OPENCLAW_STATE_DIR
              value: "/home/node/.openclaw"
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: "/home/node/.cache/ms-playwright"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1532"
            - name: NPM_CONFIG_PREFIX
              value: "/home/node/.openclaw/runtime/npm-global"
            - name: LCM_DATABASE_PATH
              value: "/home/node/.openclaw/lcm/lcm.db"
            - name: LCM_LARGE_FILES_DIR
              value: "/home/node/.openclaw/lcm/large-files"
            - name: NODE_LLAMA_CPP_CUDA
              value: "false"
            - name: OPENCLAW_GATEWAY_PORT
              value: "18789"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: gatewayToken
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: OPENROUTER_API_KEY
            - name: OPENROUTER_TOOLS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: OPENROUTER_TOOLS_API_KEY
            - name: GITHUB_MCP_PAT
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: GITHUB_MCP_PAT
            - name: HEVY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: HEVY_API_KEY
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data
              mountPath: /home/node
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              memory: 2300Mi
              cpu: 2500m
            requests:
              memory: 768Mi
              cpu: 750m
      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: tmp
          emptyDir: {}
        - name: concierge-workspace-seed
          configMap:
            name: openclaw-concierge-workspace
        - name: researcher-workspace-seed
          configMap:
            name: openclaw-researcher-workspace
        - name: browser-ops-workspace-seed
          configMap:
            name: openclaw-browser-ops-workspace
        - name: coder-workspace-seed
          configMap:
            name: openclaw-coder-workspace
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: NotIn
                    values:
                      - arm64
