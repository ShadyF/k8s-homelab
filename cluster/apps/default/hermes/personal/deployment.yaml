apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: default
  labels:
    app.kubernetes.io/name: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        runAsNonRoot: true
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: prepare-hermes-home
          image: nousresearch/hermes-agent:v2026.7.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - chown 10000:10000 /opt/data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
          volumeMounts:
            - name: data
              mountPath: /opt/data
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
        - name: install-whatsapp-bridge-deps
          image: nousresearch/hermes-agent:v2026.7.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - |
              set -eu
              bridge_dir=/opt/data/whatsapp-bridge
              rm -rf "$bridge_dir"
              mkdir -p "$bridge_dir" "$HOME" "$NPM_CONFIG_CACHE" "$NPM_CONFIG_PREFIX"
              cp -R /opt/hermes/scripts/whatsapp-bridge/. "$bridge_dir"/
              chmod -R u+rwX "$bridge_dir" "$HOME"
              cd "$bridge_dir"
              if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
                npm ci
              else
                npm install
              fi
              python - <<'PY'
              from pathlib import Path
              import json
              import os

              path = Path('/opt/data/gateway.json')
              bridge_script = '/opt/hermes/scripts/whatsapp-bridge/bridge.js'

              data = {
                  'platforms': {
                      'whatsapp': {
                          'enabled': True,
                          'extra': {
                              'bridge_script': bridge_script,
                          },
                      },
                  },
              }

              tmp = path.with_suffix(path.suffix + '.tmp')
              tmp.write_text(json.dumps(data, indent=2) + '\n', encoding='utf-8')
              os.replace(tmp, path)
              PY
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data/home
            - name: NPM_CONFIG_CACHE
              value: /opt/data/home/.npm
            - name: NPM_CONFIG_PREFIX
              value: /opt/data/home/.npm-global
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
        - name: prepare-hermes-customizations
          image: nousresearch/hermes-agent:v2026.7.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - |
              set -eu
              mkdir -p /opt/data/skills
              mkdir -p /opt/data/scripts
              install_projected_files() {
                prefix="$1"
                target_root="$2"
                marker="$prefix"__
                for source in /opt/hermes-customizations/"$marker"*; do
                  [ -e "$source" ] || continue
                  name="$(basename "$source")"
                  relative="$(printf '%s' "$name" | sed "s#^$marker##")"
                  destination="$target_root/$(printf '%s' "$relative" | sed 's#__#/#g')"
                  mkdir -p "$(dirname "$destination")"
                  cp -Lf "$source" "$destination"
                done
              }
              install_projected_files skills /opt/data/skills
              install_projected_files scripts /opt/data/scripts
              chown -R 10000:10000 /opt/data/skills /opt/data/scripts
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data/home
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - SETGID
                - SETUID
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: hermes-customizations
              mountPath: /opt/hermes-customizations
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
      containers:
        - name: gateway
          image: nousresearch/hermes-agent:v2026.7.1
          imagePullPolicy: IfNotPresent
          args:
            - gateway
            - run
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data/home
            - name: NPM_CONFIG_CACHE
              value: /opt/data/home/.npm
            - name: NPM_CONFIG_PREFIX
              value: /opt/data/home/.npm-global
            - name: HERMES_UID
              value: "10000"
            - name: HERMES_GID
              value: "10000"
            - name: WHATSAPP_MODE
              value: bot
            - name: WHATSAPP_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: WHATSAPP_ALLOWED_USERS
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OPENROUTER_API_KEY
            - name: BROWSER_CDP_URL
              value: http://chromium:9222
          ports:
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 360
          livenessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - SETGID
                - SETUID
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: data
              mountPath: /opt/hermes/scripts/whatsapp-bridge
              subPath: whatsapp-bridge
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2500m
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir:
            medium: Memory
        - name: hermes-customizations
          configMap:
            name: hermes-customizations
            defaultMode: 0555
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: NotIn
                    values:
                      - arm64
