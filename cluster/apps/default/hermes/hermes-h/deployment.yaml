apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-h
  namespace: default
  labels:
    app.kubernetes.io/name: hermes-h
    app.kubernetes.io/part-of: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-h
      app.kubernetes.io/part-of: hermes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-h
        app.kubernetes.io/part-of: hermes
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        runAsNonRoot: true
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: prepare-hermes-home
          image: nousresearch/hermes-agent:v2026.6.19
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - chown 10000:10000 /opt/data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
          volumeMounts:
            - name: data
              mountPath: /opt/data
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
        - name: install-whatsapp-bridge-deps
          image: nousresearch/hermes-agent:v2026.6.19
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - |
              set -eu
              bridge_dir=/opt/data/whatsapp-bridge
              rm -rf "$bridge_dir"
              mkdir -p "$bridge_dir" "$HOME" "$NPM_CONFIG_CACHE" "$NPM_CONFIG_PREFIX"
              cp -R /opt/hermes/scripts/whatsapp-bridge/. "$bridge_dir"/
              chmod -R u+rwX "$bridge_dir" "$HOME"
              cd "$bridge_dir"
              npm ci
              python - <<'PY'
              from pathlib import Path
              import os
              import yaml

              path = Path('/opt/data/config.yaml')
              bridge_script = '/opt/data/whatsapp-bridge/bridge.js'

              if path.exists():
                  data = yaml.safe_load(path.read_text(encoding='utf-8')) or {}
              else:
                  data = {}

              if not isinstance(data, dict):
                  raise SystemExit('/opt/data/config.yaml must be a YAML mapping')

              def ensure_mapping(parent, key, dotted):
                  value = parent.get(key)
                  if value is None:
                      value = {}
                      parent[key] = value
                  if not isinstance(value, dict):
                      raise SystemExit(f'/opt/data/config.yaml: {dotted} must be a mapping')
                  return value

              gateway = ensure_mapping(data, 'gateway', 'gateway')
              platforms = ensure_mapping(gateway, 'platforms', 'gateway.platforms')
              whatsapp = ensure_mapping(platforms, 'whatsapp', 'gateway.platforms.whatsapp')
              extra = ensure_mapping(whatsapp, 'extra', 'gateway.platforms.whatsapp.extra')

              changed = False
              if 'enabled' not in whatsapp:
                  whatsapp['enabled'] = True
                  changed = True

              if extra.get('bridge_script') != bridge_script:
                  extra['bridge_script'] = bridge_script
                  changed = True

              if changed:
                  tmp = path.with_suffix(path.suffix + '.tmp')
                  tmp.write_text(yaml.safe_dump(data, sort_keys=False), encoding='utf-8')
                  os.replace(tmp, path)
              PY
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data/home
            - name: NPM_CONFIG_CACHE
              value: /opt/data/home/.npm
            - name: NPM_CONFIG_PREFIX
              value: /opt/data/home/.npm-global
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      containers:
        - name: gateway
          image: nousresearch/hermes-agent:v2026.6.19
          imagePullPolicy: IfNotPresent
          args:
            - gateway
            - run
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data/home
            - name: NPM_CONFIG_CACHE
              value: /opt/data/home/.npm
            - name: NPM_CONFIG_PREFIX
              value: /opt/data/home/.npm-global
            - name: HERMES_UID
              value: "10000"
            - name: HERMES_GID
              value: "10000"
            - name: WHATSAPP_MODE
              value: bot
            - name: WHATSAPP_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-h-secret
                  key: WHATSAPP_ALLOWED_USERS
          ports:
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 360
          livenessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - SETGID
                - SETUID
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 750Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-h-data
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir:
            medium: Memory
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: NotIn
                    values:
                      - arm64
