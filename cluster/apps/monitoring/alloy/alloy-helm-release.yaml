apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  interval: 5m
  dependsOn:
    - name: loki
      namespace: monitoring
  chart:
    spec:
      # renovate: registryUrl=https://grafana.github.io/helm-charts
      chart: alloy
      version: 1.8.1
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    fullnameOverride: alloy
    controller:
      type: daemonset

    alloy:
      configMap:
        create: false
        name: alloy-configmap
        key: config.alloy

    serviceMonitor:
      enabled: true
